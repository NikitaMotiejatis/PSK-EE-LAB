<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
>
<h:head/>
<h:body>
    <h:outputText value="#{pirmasKomponentas.sakykLabas()}"/>
    <h:outputText value="#{pirmasKomponentas.class.name}"/>

    <h:form>
        <h:commandButton value="Test transactions" action="#{transakcijaPirmas.doWork()}"/>
    </h:form>

    <h2>Teams:</h2>
    <ol>
        <ui:repeat value="#{teams.allTeams}" var="team">
            <li><h:link value="#{team.name}" outcome="players?teamId=#{team.id}" /></li>
        </ui:repeat>
    </ol>
    <h:form>
        <h:inputText value="#{teams.teamToCreate.name}" required="true" />
        <h:commandButton value="Add new team" actionListener="#{teams.createTeam}" action="index?faces-redirect=true"/>
    </h:form>
    <h:link outcome="myBatis/teams" value="MyBatis implementation"/>
    <br/>
    <h:link outcome="tournaments" value="Tournaments (JPA - ManyToMany)"/>
    <br/>
    <h:link outcome="myBatis/tournaments" value="Tournaments (MyBatis - ManyToMany)"/>
</h:body>
</html>
